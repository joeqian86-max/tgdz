<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>六十甲子·滑动排序 | 魔方式整理</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1f6d3c 0%, #0c3b21 100%);
            font-family: 'Segoe UI', 'Roboto', 'Microsoft YaHei', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: #2a633b;
            border-radius: 48px;
            padding: 20px 24px 28px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            max-width: 1300px;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #1d472ecc;
            padding: 10px 24px;
            border-radius: 60px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .game-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffefb3;
            text-shadow: 2px 2px 0 #6b3e1a;
        }
        .stats {
            background: #1e3a28;
            padding: 6px 20px;
            border-radius: 48px;
            color: #fff0c0;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }
        button {
            background: #fad284;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.05s;
        }
        button:active {
            transform: scale(0.96);
        }
        .message {
            background: #1b3e28;
            color: #ffefb9;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        /* 表格区域 */
        .grid-wrapper {
            overflow-x: auto;
            border-radius: 28px;
            background: #1f543b;
            padding: 12px;
            box-shadow: inset 0 0 0 2px #7caf6e40;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(110px, 1fr));
            gap: 10px;
            background: transparent;
        }
        .col-header {
            text-align: center;
            font-weight: bold;
            background: #f2e3c0;
            border-radius: 30px;
            padding: 6px;
            margin-bottom: 6px;
            color: #aa6f30;
            font-size: 0.9rem;
        }
        .grid-cell {
            background: #fffffa;
            border-radius: 16px;
            padding: 10px 4px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 2px solid #e0b166;
            cursor: pointer;
            transition: 0.08s;
            min-width: 0;
        }
        .grid-cell.selected {
            background: #fff1cf;
            border: 3px solid #f7b32b;
            transform: scale(1.02);
            box-shadow: 0 0 0 2px #ffdf9c;
        }
        .grid-cell.correct-highlight {
            background: #e0f0d8;
            border-color: #4c8b3c;
        }
        .card-gz {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .card-year {
            font-size: 0.65rem;
            color: #2c6e2c;
        }
        .nayin-sm {
            font-size: 0.6rem;
            background: #f7e9cf;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
        }
        .correct-badge {
            font-size: 0.7rem;
            color: #2a7a3a;
            margin-left: 4px;
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 28px;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 850px) {
            .grid {
                grid-template-columns: repeat(6, minmax(85px, 1fr));
                gap: 6px;
            }
            .card-gz {
                font-size: 1rem;
            }
            .card-year {
                font-size: 0.55rem;
            }
            .nayin-sm {
                font-size: 0.5rem;
                padding: 1px 4px;
            }
            .col-header {
                font-size: 0.7rem;
            }
        }
        @media (max-width: 650px) {
            .grid {
                grid-template-columns: repeat(6, minmax(70px, 1fr));
            }
            .card-gz {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="game-title">🀆 六十甲子·滑动排序</div>
        <div class="stats">
            <span>📌 正确格: <span id="correctCount">0</span>/60</span>
            <button id="shuffleBtn">🎲 打乱重排</button>
        </div>
    </div>

    <div class="grid-wrapper">
        <div class="grid" id="gridContainer"></div>
    </div>

    <div class="footer">
        <div id="message" class="message">点击任意格子，再点击相邻格子（上下左右）交换位置，排成标准顺序即胜利</div>
    </div>
</div>

<script>
    // ---------- 六十甲子完整数据 ----------
    const GAN_ZHI = [
        "甲子","乙丑","丙寅","丁卯","戊辰","己巳","庚午","辛未","壬申","癸酉",
        "甲戌","乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未",
        "甲申","乙酉","丙戌","丁亥","戊子","己丑","庚寅","辛卯","壬辰","癸巳",
        "甲午","乙未","丙申","丁酉","戊戌","己亥","庚子","辛丑","壬寅","癸卯",
        "甲辰","乙巳","丙午","丁未","戊申","己酉","庚戌","辛亥","壬子","癸丑",
        "甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申","辛酉","壬戌","癸亥"
    ];
    const NA_YIN_LIST = [
        "海中金","海中金","炉中火","炉中火","大林木","大林木","路旁土","路旁土","剑锋金","剑锋金",
        "山头火","山头火","涧下水","涧下水","城头土","城头土","白蜡金","白蜡金","杨柳木","杨柳木",
        "泉中水","泉中水","屋上土","屋上土","霹雳火","霹雳火","松柏木","松柏木","长流水","长流水",
        "沙中金","沙中金","山下火","山下火","平地木","平地木","壁上土","壁上土","金箔金","金箔金",
        "佛灯火","佛灯火","天河水","天河水","大驿土","大驿土","钗钏金","钗钏金","桑柘木","桑柘木",
        "大溪水","大溪水","沙中土","沙中土","天上火","天上火","石榴木","石榴木","大海水","大海水"
    ];
    const XUN_NAMES = ["甲子旬", "甲戌旬", "甲申旬", "甲午旬", "甲辰旬", "甲寅旬"];

    // 标准顺序: 6列10行 (col, row) 对应 idx = col*10 + row
    function getStandardCard(col, row) {
        let idx = col * 10 + row;
        return {
            gz: GAN_ZHI[idx],
            year1: 1984 + idx,
            year2: 1924 + idx,
            naYin: NA_YIN_LIST[idx],
            globalIdx: idx
        };
    }

    // 构建初始标准二维数组 (col:0~5, row:0~9)
    let standardGrid = [];
    for (let col = 0; col < 6; col++) {
        let column = [];
        for (let row = 0; row < 10; row++) {
            column.push(getStandardCard(col, row));
        }
        standardGrid.push(column);
    }

    // 当前游戏状态 (深拷贝二维数组)
    let currentGrid = [];
    let selectedCell = null; // { col, row }
    let gameMessage = "点击格子选中，再点击相邻格子交换";

    // 初始化或打乱：随机交换若干次
    function initRandomShuffle() {
        // 从标准顺序开始
        let flat = [];
        for (let col = 0; col < 6; col++) {
            for (let row = 0; row < 10; row++) {
                flat.push(standardGrid[col][row]);
            }
        }
        // Fisher-Yates 洗牌
        for (let i = flat.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [flat[i], flat[j]] = [flat[j], flat[i]];
        }
        // 重新填入二维数组
        let newGrid = [];
        let idx = 0;
        for (let col = 0; col < 6; col++) {
            let colArr = [];
            for (let row = 0; row < 10; row++) {
                colArr.push(flat[idx++]);
            }
            newGrid.push(colArr);
        }
        currentGrid = newGrid;
        selectedCell = null;
        render();
    }

    // 检查当前是否胜利
    function checkVictory() {
        for (let col = 0; col < 6; col++) {
            for (let row = 0; row < 10; row++) {
                let current = currentGrid[col][row];
                let standard = standardGrid[col][row];
                if (current.globalIdx !== standard.globalIdx) {
                    return false;
                }
            }
        }
        return true;
    }

    // 计算当前正确格数
    function countCorrect() {
        let correct = 0;
        for (let col = 0; col < 6; col++) {
            for (let row = 0; row < 10; row++) {
                if (currentGrid[col][row].globalIdx === standardGrid[col][row].globalIdx) {
                    correct++;
                }
            }
        }
        return correct;
    }

    // 交换两个格子
    function swapCells(col1, row1, col2, row2) {
        if (col1 === col2 && row1 === row2) return false;
        let temp = currentGrid[col1][row1];
        currentGrid[col1][row1] = currentGrid[col2][row2];
        currentGrid[col2][row2] = temp;
        return true;
    }

    // 判断两个格子是否相邻（上下左右）
    function isAdjacent(col1, row1, col2, row2) {
        return (Math.abs(col1 - col2) + Math.abs(row1 - row2)) === 1;
    }

    // 处理格子点击
    function onCellClick(col, row) {
        if (selectedCell === null) {
            // 选中当前格子
            selectedCell = { col, row };
            gameMessage = `✨ 选中 ${currentGrid[col][row].gz}，再点击相邻格子交换`;
            render();
        } else {
            // 已有选中的格子，尝试交换
            const sCol = selectedCell.col, sRow = selectedCell.row;
            if (isAdjacent(sCol, sRow, col, row)) {
                // 执行交换
                swapCells(sCol, sRow, col, row);
                selectedCell = null;
                const correct = countCorrect();
                gameMessage = `🔄 已交换，当前正确格数：${correct}/60`;
                render();
                if (checkVictory()) {
                    setTimeout(() => {
                        alert("🎉 恭喜！六十甲子顺序完全正确！🎉\n您已精通六十甲子排列！");
                        gameMessage = "胜利！点击「打乱重排」继续挑战";
                        render();
                    }, 50);
                }
            } else {
                // 不相邻：取消选中并重新选中新格子
                gameMessage = `⚠️ 只能交换相邻的格子，已重新选中 ${currentGrid[col][row].gz}`;
                selectedCell = { col, row };
                render();
            }
        }
    }

    // 渲染网格
    function render() {
        const container = document.getElementById('gridContainer');
        container.innerHTML = '';
        // 先绘制表头（列旬名称）
        for (let col = 0; col < 6; col++) {
            const headerDiv = document.createElement('div');
            headerDiv.className = 'col-header';
            headerDiv.innerText = XUN_NAMES[col];
            container.appendChild(headerDiv);
        }
        // 绘制10行数据
        for (let row = 0; row < 10; row++) {
            for (let col = 0; col < 6; col++) {
                const card = currentGrid[col][row];
                const isCorrect = (card.globalIdx === standardGrid[col][row].globalIdx);
                const cellDiv = document.createElement('div');
                cellDiv.className = 'grid-cell';
                if (selectedCell && selectedCell.col === col && selectedCell.row === row) {
                    cellDiv.classList.add('selected');
                }
                if (isCorrect) {
                    cellDiv.classList.add('correct-highlight');
                }
                // 显示内容
                const year1 = 1984 + card.globalIdx;
                const year2 = 1924 + card.globalIdx;
                cellDiv.innerHTML = `
                    <div class="card-gz">${card.gz}</div>
                    <div class="card-year">${year1}年/${year2}年</div>
                    <div class="nayin-sm">${card.naYin}</div>
                    ${isCorrect ? '<span class="correct-badge">✓</span>' : ''}
                `;
                cellDiv.addEventListener('click', (function(c, r) {
                    return function() { onCellClick(c, r); };
                })(col, row));
                container.appendChild(cellDiv);
            }
        }
        document.getElementById('correctCount').innerText = countCorrect();
        document.getElementById('message').innerText = gameMessage;
    }

    // 打乱按钮
    document.getElementById('shuffleBtn').addEventListener('click', () => {
        initRandomShuffle();
        selectedCell = null;
        gameMessage = "已打乱顺序，通过相邻交换排成标准顺序吧！";
        render();
    });

    // 初始化游戏
    initRandomShuffle();
</script>
</body>
</html>
