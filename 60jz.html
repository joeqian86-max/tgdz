<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六十甲子·丝滑滑动排序 | 闹钟式滚轮</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a6b3c 0%, #0c3b21 100%);
            font-family: 'Segoe UI', 'Roboto', 'Microsoft YaHei', system-ui, sans-serif;
            padding: 12px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: #2a633b;
            border-radius: 36px;
            padding: 16px 16px 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            max-width: 1400px;
            width: 100%;
            transition: all 0.2s;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1d472ecc;
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .game-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffefb3;
            text-shadow: 1px 1px 0 #6b3e1a;
        }
        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #1e3a28;
            padding: 4px 14px;
            border-radius: 48px;
            color: #fff0c0;
        }
        button {
            background: #fad284;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.05s;
            font-family: inherit;
        }
        button:active {
            transform: scale(0.96);
        }
        .message-area {
            background: #1b3e28;
            color: #ffefb9;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .swipe-hint {
            background: #2a482e;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        /* 游戏主区域 - 无箭头时满铺 */
        .game-matrix {
            position: relative;
            background: #1f543b;
            border-radius: 28px;
            padding: 8px;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
        }

        .matrix-table {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            background: transparent;
        }

        /* 行样式 - 用于滑动动画 */
        .card-row {
            display: contents;
        }

        .card-cell {
            background: #fffffa;
            border-radius: 14px;
            padding: 10px 2px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            border: 2px solid #e0b166;
            transition: transform 0.08s ease;
            cursor: pointer;
            will-change: transform;
        }
        .card-cell:active {
            transform: scale(0.98);
        }
        .card-gz {
            font-size: clamp(0.8rem, 4vw, 1.2rem);
            font-weight: 800;
            margin-bottom: 4px;
        }
        .card-year {
            font-size: clamp(0.5rem, 2.5vw, 0.65rem);
            color: #2c6e2c;
        }
        .nayin-sm {
            font-size: clamp(0.5rem, 2.5vw, 0.6rem);
            background: #f7e9cf;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 4px;
        }
        .correct-highlight {
            background: #e0f5d8;
            border-color: #4c8b3c;
            box-shadow: 0 0 0 2px #7eb86a;
        }

        /* 电脑版箭头（仅在非触摸或宽屏显示） */
        .pc-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 16px;
        }
        .pc-row-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .pc-col-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .arrow-btn {
            background: #e9c27c;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            min-width: 60px;
            transition: 0.05s;
        }
        .arrow-btn:active {
            transform: scale(0.96);
        }

        /* 手机端隐藏所有PC箭头，全屏展示表格 */
        @media (max-width: 768px) {
            .pc-controls {
                display: none;
            }
            .game-container {
                padding: 12px;
            }
            .matrix-table {
                gap: 4px;
            }
            .card-cell {
                padding: 6px 2px;
            }
            .message-area .swipe-hint {
                display: inline-block;
            }
        }

        /* 大屏幕保留箭头，同时表格依然美观 */
        @media (min-width: 769px) {
            .swipe-hint {
                display: none;
            }
            .matrix-table {
                gap: 8px;
            }
        }

        /* 滑动时高亮 */
        .sliding-row {
            background: #ffefb3;
            transition: none;
        }
        .sliding-col {
            background: #ffefb3;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="game-title">🀆 六十甲子·魔方滑动</div>
        <div class="stats">
            <span>✅ 归位: <span id="correctCount">0</span>/60</span>
            <button id="shuffleBtn">🎲 打乱</button>
        </div>
    </div>

    <!-- 矩阵区域（手机无箭头） -->
    <div class="game-matrix" id="gameMatrix">
        <div class="matrix-table" id="matrixTable"></div>
    </div>

    <!-- 电脑端专用箭头控制区（手机自动隐藏） -->
    <div class="pc-controls" id="pcControls">
        <div class="pc-row-controls">
            <div style="font-weight: bold;">行控制</div>
            <div id="rowLeftBtn" class="arrow-btn">◀ 左移</div>
            <div id="rowRightBtn" class="arrow-btn">右移 ▶</div>
            <span>选择行: </span>
            <select id="rowSelect">
                <option value="0">第1行</option><option value="1">第2行</option><option value="2">第3行</option>
                <option value="3">第4行</option><option value="4">第5行</option><option value="5">第6行</option>
                <option value="6">第7行</option><option value="7">第8行</option><option value="8">第9行</option>
                <option value="9">第10行</option>
            </select>
        </div>
        <div class="pc-col-controls">
            <div style="font-weight: bold;">列控制</div>
            <div id="colUpBtn" class="arrow-btn">▲ 上移</div>
            <div id="colDownBtn" class="arrow-btn">下移 ▼</div>
            <span>选择列: </span>
            <select id="colSelect">
                <option value="0">甲子旬</option><option value="1">甲戌旬</option><option value="2">甲申旬</option>
                <option value="3">甲午旬</option><option value="4">甲辰旬</option><option value="5">甲寅旬</option>
            </select>
        </div>
    </div>

    <div class="message-area">
        <span>📱 手指横向滑动 → 移动整行 &nbsp;&nbsp; 纵向滑动 → 移动整列</span>
        <span class="swipe-hint">⬅️➡️ 滑动行 &nbsp;&nbsp; ⬆️⬇️ 滑动列</span>
    </div>
</div>

<script>
    // ---------- 六十甲子数据 ----------
    const GAN_ZHI = [
        "甲子","乙丑","丙寅","丁卯","戊辰","己巳","庚午","辛未","壬申","癸酉",
        "甲戌","乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未",
        "甲申","乙酉","丙戌","丁亥","戊子","己丑","庚寅","辛卯","壬辰","癸巳",
        "甲午","乙未","丙申","丁酉","戊戌","己亥","庚子","辛丑","壬寅","癸卯",
        "甲辰","乙巳","丙午","丁未","戊申","己酉","庚戌","辛亥","壬子","癸丑",
        "甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申","辛酉","壬戌","癸亥"
    ];
    const NA_YIN_LIST = [
        "海中金","海中金","炉中火","炉中火","大林木","大林木","路旁土","路旁土","剑锋金","剑锋金",
        "山头火","山头火","涧下水","涧下水","城头土","城头土","白蜡金","白蜡金","杨柳木","杨柳木",
        "泉中水","泉中水","屋上土","屋上土","霹雳火","霹雳火","松柏木","松柏木","长流水","长流水",
        "沙中金","沙中金","山下火","山下火","平地木","平地木","壁上土","壁上土","金箔金","金箔金",
        "佛灯火","佛灯火","天河水","天河水","大驿土","大驿土","钗钏金","钗钏金","桑柘木","桑柘木",
        "大溪水","大溪水","沙中土","沙中土","天上火","天上火","石榴木","石榴木","大海水","大海水"
    ];
    const XUN_NAMES = ["甲子旬", "甲戌旬", "甲申旬", "甲午旬", "甲辰旬", "甲寅旬"];

    // 标准网格 (6列10行)
    let standardGrid = [];
    for (let col = 0; col < 6; col++) {
        let column = [];
        for (let row = 0; row < 10; row++) {
            let idx = col * 10 + row;
            column.push({
                gz: GAN_ZHI[idx],
                year1: 1984 + idx,
                year2: 1924 + idx,
                naYin: NA_YIN_LIST[idx],
                globalIdx: idx
            });
        }
        standardGrid.push(column);
    }

    // 当前网格状态 [col][row]
    let currentGrid = [];

    // 初始化标准顺序
    function initStandard() {
        currentGrid = [];
        for (let col = 0; col < 6; col++) {
            let colArr = [];
            for (let row = 0; row < 10; row++) {
                colArr.push({ ...standardGrid[col][row] });
            }
            currentGrid.push(colArr);
        }
    }

    // 打乱 (随机行列移动)
    function randomShuffle() {
        initStandard();
        const steps = 200 + Math.floor(Math.random() * 150);
        for (let s = 0; s < steps; s++) {
            const type = Math.random() > 0.5 ? 'row' : 'col';
            if (type === 'row') {
                const row = Math.floor(Math.random() * 10);
                const dir = Math.random() > 0.5 ? 'left' : 'right';
                moveRowDirect(row, dir, 1);
            } else {
                const col = Math.floor(Math.random() * 6);
                const dir = Math.random() > 0.5 ? 'up' : 'down';
                moveColDirect(col, dir, 1);
            }
        }
        renderTable();
        updateCorrectCount();
        checkWin();
    }

    // 直接移动数据 (无动画)
    function moveRowDirect(rowIdx, direction, steps = 1) {
        if (steps === 0) return;
        let actualSteps = steps % 6;
        if (actualSteps === 0) return;
        let newRow = [];
        for (let col = 0; col < 6; col++) {
            newRow.push(currentGrid[col][rowIdx]);
        }
        if (direction === 'left') {
            let removed = newRow.splice(0, actualSteps);
            newRow.push(...removed);
        } else {
            let removed = newRow.splice(-actualSteps);
            newRow = [...removed, ...newRow];
        }
        for (let col = 0; col < 6; col++) {
            currentGrid[col][rowIdx] = newRow[col];
        }
    }

    function moveColDirect(colIdx, direction, steps = 1) {
        if (steps === 0) return;
        let actualSteps = steps % 10;
        if (actualSteps === 0) return;
        let newCol = [];
        for (let row = 0; row < 10; row++) {
            newCol.push(currentGrid[colIdx][row]);
        }
        if (direction === 'up') {
            let removed = newCol.splice(0, actualSteps);
            newCol.push(...removed);
        } else {
            let removed = newCol.splice(-actualSteps);
            newCol = [...removed, ...newCol];
        }
        for (let row = 0; row < 10; row++) {
            currentGrid[colIdx][row] = newCol[row];
        }
    }

    // 计算正确个数
    function countCorrect() {
        let correct = 0;
        for (let col = 0; col < 6; col++) {
            for (let row = 0; row < 10; row++) {
                if (currentGrid[col][row].globalIdx === standardGrid[col][row].globalIdx) {
                    correct++;
                }
            }
        }
        return correct;
    }
    function updateCorrectCount() {
        const c = countCorrect();
        document.getElementById('correctCount').innerText = c;
        if (c === 60) {
            setTimeout(() => {
                alert("🎉 恭喜！六十甲子完美归位！顺序完全正确！🎉");
            }, 100);
        }
        return c;
    }
    function checkWin() {
        if (countCorrect() === 60) {
            // 已弹窗
        }
    }

    // 渲染表格 (无动画)
    function renderTable() {
        const container = document.getElementById('matrixTable');
        container.innerHTML = '';
        for (let row = 0; row < 10; row++) {
            for (let col = 0; col < 6; col++) {
                const card = currentGrid[col][row];
                const isCorrect = (card.globalIdx === standardGrid[col][row].globalIdx);
                const cell = document.createElement('div');
                cell.className = 'card-cell';
                if (isCorrect) cell.classList.add('correct-highlight');
                cell.innerHTML = `
                    <div class="card-gz">${card.gz}</div>
                    <div class="card-year">${card.year1}年/${card.year2}年</div>
                    <div class="nayin-sm">${card.naYin}</div>
                `;
                container.appendChild(cell);
            }
        }
    }

    // ========== 丝滑滑动 (类似闹钟滚轮) ==========
    let touchStart = null;
    let touchStartTime = 0;
    let currentActiveRow = null;   // 正在滑动的行索引
    let currentActiveCol = null;   // 正在滑动的列索引
    let initialTranslateX = 0;
    let initialTranslateY = 0;
    let animationFrame = null;
    let slideDirection = null;      // 'row' or 'col'

    // 获取行所有卡片元素 (通过行列坐标)
    function getRowCells(rowIdx) {
        const allCells = document.querySelectorAll('.card-cell');
        let cells = [];
        for (let i = 0; i < allCells.length; i++) {
            const row = Math.floor(i / 6);
            if (row === rowIdx) cells.push(allCells[i]);
        }
        return cells;
    }
    function getColCells(colIdx) {
        const allCells = document.querySelectorAll('.card-cell');
        let cells = [];
        for (let i = 0; i < allCells.length; i++) {
            const col = i % 6;
            if (col === colIdx) cells.push(allCells[i]);
        }
        return cells;
    }

    // 重置所有偏移
    function resetAllOffsets() {
        const allCells = document.querySelectorAll('.card-cell');
        allCells.forEach(cell => {
            cell.style.transform = '';
        });
    }

    // 更新一行或一列的位置 (实时偏移)
    function updateRowOffset(rowIdx, offsetX) {
        const cells = getRowCells(rowIdx);
        cells.forEach(cell => {
            cell.style.transform = `translateX(${offsetX}px)`;
        });
    }
    function updateColOffset(colIdx, offsetY) {
        const cells = getColCells(colIdx);
        cells.forEach(cell => {
            cell.style.transform = `translateY(${offsetY}px)`;
        });
    }

    // 根据偏移距离计算移动步数 (每80~100px一格)
    function stepsFromOffset(offset, cellSize, direction) {
        let threshold = direction === 'row' ? 70 : 60;
        let steps = Math.floor(Math.abs(offset) / threshold);
        if (steps === 0 && Math.abs(offset) > threshold * 0.4) steps = 1;
        return Math.min(direction === 'row' ? 5 : 9, steps);
    }

    // 惯性滑动完成后的最终移动
    function commitSlide(direction, idx, totalSteps, finalDir) {
        if (totalSteps === 0) return;
        if (direction === 'row') {
            moveRowDirect(idx, finalDir, totalSteps);
        } else {
            moveColDirect(idx, finalDir, totalSteps);
        }
        renderTable();
        updateCorrectCount();
        checkWin();
        // 微震效果（模拟到达档位）
        if (totalSteps > 0) {
            const cells = direction === 'row' ? getRowCells(idx) : getColCells(idx);
            cells.forEach(cell => {
                cell.style.transform = `scale(0.98)`;
                setTimeout(() => { if(cell) cell.style.transform = ''; }, 100);
            });
        }
    }

    // 触摸开始
    function onTouchStart(e) {
        e.preventDefault();
        const touch = e.touches[0];
        touchStart = { x: touch.clientX, y: touch.clientY };
        touchStartTime = Date.now();
        // 查找触摸点下的卡片所在行列
        const elem = document.elementsFromPoint(touch.clientX, touch.clientY);
        let targetCell = null;
        for (let el of elem) {
            if (el.classList && el.classList.contains('card-cell')) {
                targetCell = el;
                break;
            }
        }
        if (!targetCell) return;
        const allCells = Array.from(document.querySelectorAll('.card-cell'));
        const idx = allCells.indexOf(targetCell);
        if (idx !== -1) {
            const row = Math.floor(idx / 6);
            const col = idx % 6;
            currentActiveRow = row;
            currentActiveCol = col;
        } else {
            currentActiveRow = null;
            currentActiveCol = null;
        }
        slideDirection = null;
        resetAllOffsets();
    }

    let lastOffsetX = 0, lastOffsetY = 0;
    function onTouchMove(e) {
        if (!touchStart) return;
        e.preventDefault();
        const touch = e.touches[0];
        const deltaX = touch.clientX - touchStart.x;
        const deltaY = touch.clientY - touchStart.y;
        const absX = Math.abs(deltaX);
        const absY = Math.abs(deltaY);

        if (!slideDirection) {
            if (absX > 10 && absX > absY) {
                slideDirection = 'row';
                if (currentActiveRow === null) return;
            } else if (absY > 10 && absY > absX) {
                slideDirection = 'col';
                if (currentActiveCol === null) return;
            } else {
                return;
            }
        }

        if (slideDirection === 'row' && currentActiveRow !== null) {
            // 横向滑动行，限制最大偏移一格半的范围，达到阈值后直接移动
            let limitedX = Math.min(Math.max(deltaX, -100), 100);
            updateRowOffset(currentActiveRow, limitedX);
            lastOffsetX = deltaX;
        } else if (slideDirection === 'col' && currentActiveCol !== null) {
            let limitedY = Math.min(Math.max(deltaY, -150), 150);
            updateColOffset(currentActiveCol, limitedY);
            lastOffsetY = deltaY;
        }
    }

    function onTouchEnd(e) {
        if (!touchStart) {
            resetAllOffsets();
            return;
        }
        e.preventDefault();
        const duration = Date.now() - touchStartTime;
        let steps = 0;
        let direction = '';
        if (slideDirection === 'row' && currentActiveRow !== null) {
            const offset = lastOffsetX;
            const absOffset = Math.abs(offset);
            // 根据滑动距离和速度估算步数
            let rawSteps = Math.floor(absOffset / 55); // 每55px一格
            if (duration < 200 && absOffset > 20) {
                // 快速滑动增加惯性步数
                rawSteps = Math.min(5, rawSteps + 1);
            }
            steps = Math.min(5, rawSteps);
            if (steps === 0 && absOffset > 25) steps = 1;
            direction = offset > 0 ? 'right' : 'left';
            if (steps > 0) {
                commitSlide('row', currentActiveRow, steps, direction);
            } else {
                renderTable(); // 无移动则重置
            }
        } else if (slideDirection === 'col' && currentActiveCol !== null) {
            const offset = lastOffsetY;
            const absOffset = Math.abs(offset);
            let rawSteps = Math.floor(absOffset / 50);
            if (duration < 200 && absOffset > 20) rawSteps = Math.min(9, rawSteps + 1);
            steps = Math.min(9, rawSteps);
            if (steps === 0 && absOffset > 25) steps = 1;
            direction = offset > 0 ? 'down' : 'up';
            if (steps > 0) {
                commitSlide('col', currentActiveCol, steps, direction);
            } else {
                renderTable();
            }
        } else {
            renderTable();
        }
        // 重置状态
        touchStart = null;
        currentActiveRow = null;
        currentActiveCol = null;
        slideDirection = null;
        resetAllOffsets();
        lastOffsetX = 0;
        lastOffsetY = 0;
    }

    // 电脑端箭头控制 (直接移动)
    function setupPCControls() {
        if (window.innerWidth <= 768) return; // 手机端无箭头
        const rowSelect = document.getElementById('rowSelect');
        const colSelect = document.getElementById('colSelect');
        document.getElementById('rowLeftBtn').onclick = () => {
            const row = parseInt(rowSelect.value);
            moveRowDirect(row, 'left', 1);
            renderTable();
            updateCorrectCount();
            checkWin();
        };
        document.getElementById('rowRightBtn').onclick = () => {
            const row = parseInt(rowSelect.value);
            moveRowDirect(row, 'right', 1);
            renderTable();
            updateCorrectCount();
            checkWin();
        };
        document.getElementById('colUpBtn').onclick = () => {
            const col = parseInt(colSelect.value);
            moveColDirect(col, 'up', 1);
            renderTable();
            updateCorrectCount();
            checkWin();
        };
        document.getElementById('colDownBtn').onclick = () => {
            const col = parseInt(colSelect.value);
            moveColDirect(col, 'down', 1);
            renderTable();
            updateCorrectCount();
            checkWin();
        };
    }

    // 重置与打乱
    function resetGame() {
        randomShuffle();
        renderTable();
        updateCorrectCount();
    }

    // 窗口大小改变时重新调整布局，并重新绑定触摸事件防止内存泄漏
    let matrixDiv = null;
    function bindEvents() {
        matrixDiv = document.getElementById('gameMatrix');
        if (matrixDiv) {
            matrixDiv.removeEventListener('touchstart', onTouchStart);
            matrixDiv.removeEventListener('touchmove', onTouchMove);
            matrixDiv.removeEventListener('touchend', onTouchEnd);
            matrixDiv.addEventListener('touchstart', onTouchStart, { passive: false });
            matrixDiv.addEventListener('touchmove', onTouchMove, { passive: false });
            matrixDiv.addEventListener('touchend', onTouchEnd);
        }
    }

    // 初始化
    function init() {
        initStandard();
        randomShuffle();
        renderTable();
        bindEvents();
        setupPCControls();
        updateCorrectCount();
        document.getElementById('shuffleBtn').onclick = () => {
            resetGame();
        };
        window.addEventListener('resize', () => {
            renderTable();
            bindEvents();
            setupPCControls();
        });
    }

    init();
</script>
</body>
</html>
