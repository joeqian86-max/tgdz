<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>时空能量课堂 · 六冲消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background-color: #fff8ed;
            font-family: system-ui, 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .game-container {
            max-width: 540px;
            width: 100%;
            margin: 0 auto;
            background-color: #fff8ed;
            border-radius: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 10px 28px;
        }

        .game-title {
            font-size: 1.9rem;
            font-weight: 800;
            color: #2c6e9e;
            text-align: center;
            letter-spacing: 0.02em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        /* 进度和按钮面板 */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: #f6efdf;
            border-radius: 60px;
            padding: 8px 18px;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .progress-box {
            background: #e7dcc4;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: 700;
            font-size: 1.15rem;
            color: #7a5a3a;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
        }
        .progress-box span {
            font-weight: 800;
            color: #b87333;
            font-size: 1.3rem;
        }
        .control-buttons {
            display: flex;
            gap: 12px;
        }
        .ctrl-btn {
            background-color: #d9c6a7;
            border: none;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a3622;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ctrl-btn:active {
            transform: scale(0.96);
            background-color: #c4ae88;
        }
        /* 网格布局 */
        .bubbles-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px 10px;
            width: 100%;
            margin: 8px 0 16px;
            justify-items: center;
            align-items: center;
            position: relative;
            z-index: 5;
        }

        /* 原始泡泡缩小尺寸 */
        .bubble {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 92px;
            background: radial-gradient(circle at 30% 28%, rgba(255,255,240,0.95), rgba(220,220,200,0.8));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.6rem;
            color: #2c2c2c;
            box-shadow: 0 12px 16px -8px rgba(0, 0, 0, 0.3), 0 4px 8px rgba(0, 0, 0, 0.1), inset 0 -3px 0 rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.7);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
            will-change: transform;
            text-shadow: 0 1px 0 rgba(255,255,200,0.6);
            position: relative;
            z-index: 10;
        }

        .bubble[data-color="blue"] {
            background: radial-gradient(circle at 32% 28%, #aad4ff, #3c7cb0);
            box-shadow: 0 12px 16px -8px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,245,0.8);
        }
        .bubble[data-color="pink"] {
            background: radial-gradient(circle at 32% 28%, #ffb7c5, #e56a8a);
            box-shadow: 0 12px 16px -8px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,245,0.8);
        }
        .bubble[data-color="brown"] {
            background: radial-gradient(circle at 32% 28%, #d6b588, #a5724b);
            box-shadow: 0 12px 16px -8px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,240,200,0.7);
        }
        .bubble[data-color="white"] {
            background: radial-gradient(circle at 32% 28%, #f9f9fc, #d4dee8);
            box-shadow: 0 12px 16px -8px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.1), inset 0 2px 6px #ffffff;
        }
        .bubble[data-color="green"] {
            background: radial-gradient(circle at 32% 28%, #b1dfb1, #519c5a);
            box-shadow: 0 12px 16px -8px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,225,0.8);
        }

        /* 抖动动画 */
        .shake-active {
            animation: shakeBox 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shakeBox {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-4px, 2px) rotate(-2deg); }
            40% { transform: translate(4px, -1px) rotate(2deg); }
            60% { transform: translate(-2px, 1px) rotate(-1deg); }
            80% { transform: translate(2px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        /* 匹配动画中原始泡泡透明且不可点击，但保留占位（被遮挡问题通过降低飞泡z-index解决）*/
        .bubble.matching-hide {
            opacity: 0;
            visibility: visible;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        /* 飞行动画层 - 让动画泡泡位于原始泡泡下方(避免遮挡) */
        .match-effect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;    /* 低于原始泡泡 (原始泡泡z-index 10) */
        }

        .fly-bubble {
            position: fixed;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.6rem;
            color: #2c2c2c;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            transition: all 0.38s cubic-bezier(0.2, 0.85, 0.4, 1.1);
            z-index: 9;     /* 略低于原始泡泡(10)，但高于背景; 不会遮挡点击 */
            text-shadow: 0 1px 0 white;
        }

        /* 相遇后的摇晃冲击动画，持续 */
        .impact-shake-loop {
            animation: impactShakeSoft 0.4s ease-in-out infinite;
        }
        @keyframes impactShakeSoft {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5px, -2px) rotate(2deg); }
            50% { transform: translate(-5px, 2px) rotate(-2deg); }
            75% { transform: translate(3px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        .success-message {
            background: #e9d9b5;
            border-radius: 60px;
            padding: 10px 20px;
            margin-top: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            color: #b1622c;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        footer {
            font-size: 0.7rem;
            color: #c9b48b;
            margin-top: 12px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .bubbles-grid {
                gap: 10px 8px;
            }
            .bubble {
                max-width: 76px;
                font-size: 1.35rem;
            }
            .fly-bubble {
                width: 58px;
                height: 58px;
                font-size: 1.3rem;
            }
            .info-panel {
                padding: 6px 14px;
            }
            .ctrl-btn {
                padding: 4px 14px;
                font-size: 0.8rem;
            }
            .progress-box {
                font-size: 1rem;
                padding: 4px 14px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-title">时空能量课堂 · 六冲能量</div>
    
    <div class="info-panel">
        <div class="progress-box">地支六冲 <span id="pairCounter">0</span>/6</div>
        <div class="control-buttons">
            <button class="ctrl-btn" id="restartBtn">🌀 重启乾坤</button>
            <button class="ctrl-btn" id="soundToggleBtn">🔊 音效 开</button>
        </div>
    </div>
    
    <div class="bubbles-grid" id="bubblesGrid"></div>
    <div id="messageArea" style="min-height: 65px;"></div>
    <footer>六冲相合 · 子午/丑未/辰戌/巳亥/寅申/卯酉</footer>
</div>

<script>
    // ----- 地支数据与配对规则 ----------
    const allTerms = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const pairsMap = new Map();
    pairsMap.set("子", "午");
    pairsMap.set("午", "子");
    pairsMap.set("丑", "未");
    pairsMap.set("未", "丑");
    pairsMap.set("辰", "戌");
    pairsMap.set("戌", "辰");
    pairsMap.set("巳", "亥");
    pairsMap.set("亥", "巳");
    pairsMap.set("寅", "申");
    pairsMap.set("申", "寅");
    pairsMap.set("卯", "酉");
    pairsMap.set("酉", "卯");

    function getColorAttr(term) {
        if (term === "子" || term === "亥") return "blue";
        if (term === "巳" || term === "午") return "pink";
        if (term === "丑" || term === "辰" || term === "未" || term === "戌") return "brown";
        if (term === "申" || term === "酉") return "white";
        if (term === "寅" || term === "卯") return "green";
        return "blue";
    }

    // 游戏状态
    let currentGameData = [];          // { id, term, matched, dom, color }
    let selectedBubbleDom = null;
    let selectedTerm = null;
    let selectedId = null;
    let isProcessing = false;
    let matchedPairsCount = 0;          // 成功配对的对数 (每配对一对方+1)
    let gameCompleted = false;
    
    // 音效开关 (默认开)
    let soundEnabled = true;
    
    // 存储所有持续存在的飞泡对（用于重置时清理）
    let activeFlyPairs = [];
    
    // 音效系统
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.warn("Web Audio not supported"); return null; }
        return audioCtx;
    }
    function playSound(type) {
        if (!soundEnabled) return;
        let ctx = initAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.28, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.exponentialRampToValueAtTime(660, now + 0.18);
            osc.start();
            osc.stop(now + 0.32);
        } else if (type === 'error') {
            osc.frequency.setValueAtTime(480, now);
            osc.frequency.exponentialRampToValueAtTime(360, now + 0.2);
            osc.start();
            osc.stop(now + 0.28);
        } else if (type === 'complete') {
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.22, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.frequency.setValueAtTime(1046, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
            osc.start();
            osc.stop(now + 0.2);
            osc2.frequency.setValueAtTime(1318, now + 0.12);
            osc2.frequency.exponentialRampToValueAtTime(1046, now + 0.28);
            osc2.start(now + 0.12);
            osc2.stop(now + 0.42);
        }
        if (ctx.state === 'suspended') {
            ctx.resume();
        }
    }

    // 更新UI计数器
    function updateCounterUI() {
        const span = document.getElementById('pairCounter');
        if (span) span.innerText = matchedPairsCount;
    }
    
    // 清除所有持续存在的飞泡对（重置时使用）
    function clearAllPersistentFlies() {
        for (let pair of activeFlyPairs) {
            if (pair.overlay && pair.overlay.parentNode) pair.overlay.parentNode.removeChild(pair.overlay);
        }
        activeFlyPairs = [];
    }

    // 配对正确核心：生成持续摇晃泡泡对，并且位于原始泡泡下层（通过z-index实现已处理）
    function createPersistentMatchAnimation(firstDom, secondDom, firstTerm, secondTerm, firstId, secondId) {
        const rect1 = firstDom.getBoundingClientRect();
        const rect2 = secondDom.getBoundingClientRect();
        const center1 = { x: rect1.left + rect1.width / 2, y: rect1.top + rect1.height / 2 };
        const center2 = { x: rect2.left + rect2.width / 2, y: rect2.top + rect2.height / 2 };
        const meetPoint = { x: (center1.x + center2.x) / 2, y: (center1.y + center2.y) / 2 };
        
        const overlay = document.createElement('div');
        overlay.className = 'match-effect-overlay';
        document.body.appendChild(overlay);
        
        const flySize = 70;
        const clone1 = document.createElement('div');
        clone1.className = 'fly-bubble';
        clone1.innerText = firstTerm;
        clone1.style.left = `${center1.x - flySize/2}px`;
        clone1.style.top = `${center1.y - flySize/2}px`;
        clone1.style.width = `${flySize}px`;
        clone1.style.height = `${flySize}px`;
        clone1.style.lineHeight = `${flySize}px`;
        clone1.style.textAlign = 'center';
        clone1.style.background = getGradientForColor(getColorAttr(firstTerm));
        
        const clone2 = document.createElement('div');
        clone2.className = 'fly-bubble';
        clone2.innerText = secondTerm;
        clone2.style.left = `${center2.x - flySize/2}px`;
        clone2.style.top = `${center2.y - flySize/2}px`;
        clone2.style.width = `${flySize}px`;
        clone2.style.height = `${flySize}px`;
        clone2.style.lineHeight = `${flySize}px`;
        clone2.style.textAlign = 'center';
        clone2.style.background = getGradientForColor(getColorAttr(secondTerm));
        
        overlay.appendChild(clone1);
        overlay.appendChild(clone2);
        
        // 隐藏原始泡泡
        firstDom.classList.add('matching-hide');
        secondDom.classList.add('matching-hide');
        
        requestAnimationFrame(() => {
            clone1.style.transition = 'all 0.38s cubic-bezier(0.2, 0.9, 0.4, 1.2)';
            clone2.style.transition = 'all 0.38s cubic-bezier(0.2, 0.9, 0.4, 1.2)';
            clone1.style.left = `${meetPoint.x - 38}px`;
            clone1.style.top = `${meetPoint.y - flySize/2}px`;
            clone2.style.left = `${meetPoint.x + 2}px`;
            clone2.style.top = `${meetPoint.y - flySize/2}px`;
        });
        
        setTimeout(() => {
            clone1.classList.add('impact-shake-loop');
            clone2.classList.add('impact-shake-loop');
            activeFlyPairs.push({
                overlay: overlay,
                clone1: clone1,
                clone2: clone2,
                container: overlay
            });
        }, 380);
        
        // 更新匹配数据和计数器
        markPairMatched(firstId, secondId, firstDom, secondDom);
    }
    
    function getGradientForColor(colorType) {
        if (colorType === 'blue') return 'radial-gradient(circle at 32% 28%, #aad4ff, #3c7cb0)';
        if (colorType === 'pink') return 'radial-gradient(circle at 32% 28%, #ffb7c5, #e56a8a)';
        if (colorType === 'brown') return 'radial-gradient(circle at 32% 28%, #d6b588, #a5724b)';
        if (colorType === 'white') return 'radial-gradient(circle at 32% 28%, #f9f9fc, #d4dee8)';
        if (colorType === 'green') return 'radial-gradient(circle at 32% 28%, #b1dfb1, #519c5a)';
        return 'radial-gradient(circle at 30% 28%, #d9c8a7, #b6905a)';
    }
    
    function markPairMatched(idA, idB, domA, domB) {
        const itemA = currentGameData.find(d => d.id === idA);
        const itemB = currentGameData.find(d => d.id === idB);
        if (itemA && !itemA.matched) {
            itemA.matched = true;
            matchedPairsCount++;
        }
        if (itemB && !itemB.matched) {
            itemB.matched = true;
            // 避免重复计数（因为两个配对为一对，只需+1一次，上面已加过一次，这里防止累积）
            if (itemA && itemA.matched && itemB && !itemB.matched) {
                // 这种情况不额外加，因为同一对两个未匹配状态只会走第一条，第二条刚进来时不会重复加，保证每对准确只增加一次
            } else if (!itemA.matched) {
                // 安全处理：确保每个对只增加一次。
            }
        }
        // 强制重新校正确保一对只增加一次：因为两个同时从未匹配到匹配，matchedPairsCount只需要加1。
        // 修正由于两次标记导致多加一次的情况
        if (itemA && itemB && !itemA.wasCounted) {
            // 使用额外标记避免重复
            if (itemA.pairCounted) return;
            itemA.pairCounted = true;
            itemB.pairCounted = true;
        } else if (itemA && !itemA.pairCounted && itemB && !itemB.pairCounted) {
            // 首次配对
            if (itemA.matched && itemB.matched) {
                // 已经增加过，不用再增加。
            }
        }
        // 重新矫正逻辑保证每对只增加一次，但已增加可能重复，根据matchedPairsCount防抖:
        // 简单方式: 统计已配对的地支数量/2作为标准显示。
        const realPairedCount = currentGameData.filter(d => d.matched === true).length / 2;
        if (realPairedCount !== matchedPairsCount) {
            matchedPairsCount = realPairedCount;
        }
        updateCounterUI();
        
        if (domA) {
            domA.style.opacity = '0';
            domA.style.pointerEvents = 'none';
        }
        if (domB) {
            domB.style.opacity = '0';
            domB.style.pointerEvents = 'none';
        }
        
        // 胜利判定
        if (matchedPairsCount === 6 && !gameCompleted) {
            gameCompleted = true;
            playSound('complete');
            const msgDiv = document.getElementById('messageArea');
            msgDiv.innerHTML = '<div class="success-message">🎉 恭喜你挑战成功！六冲能量，时空共振 🎉</div>';
        }
    }
    
    function clearSelected() {
        if (selectedBubbleDom) selectedBubbleDom = null;
        selectedTerm = null;
        selectedId = null;
    }
    
    function handleBubbleClick(dom, term, id) {
        if (gameCompleted || isProcessing) return;
        const item = currentGameData.find(d => d.id === id);
        if (item.matched) return;
        
        if (selectedBubbleDom === null) {
            selectedBubbleDom = dom;
            selectedTerm = term;
            selectedId = id;
            dom.classList.add('shake-active');
            setTimeout(() => {
                if (dom) dom.classList.remove('shake-active');
            }, 300);
            return;
        }
        
        const firstDom = selectedBubbleDom;
        const firstTerm = selectedTerm;
        const firstId = selectedId;
        
        if (firstDom === dom) {
            clearSelected();
            return;
        }
        
        const isCorrect = (pairsMap.get(firstTerm) === term);
        if (isCorrect) {
            playSound('correct');
            isProcessing = true;
            createPersistentMatchAnimation(firstDom, dom, firstTerm, term, firstId, id);
            clearSelected();
            setTimeout(() => {
                isProcessing = false;
            }, 500);
        } else {
            playSound('error');
            dom.style.transition = '0.1s';
            dom.style.boxShadow = '0 0 0 2px #d9534f, 0 12px 16px -8px rgba(0,0,0,0.3)';
            setTimeout(() => {
                if (dom) dom.style.boxShadow = '';
            }, 220);
            clearSelected();
        }
    }
    
    function renderGame() {
        const grid = document.getElementById('bubblesGrid');
        grid.innerHTML = '';
        currentGameData.forEach((item) => {
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.setAttribute('data-term', item.term);
            bubbleDiv.setAttribute('data-id', item.id);
            bubbleDiv.setAttribute('data-color', item.color);
            bubbleDiv.innerText = item.term;
            if (item.matched) {
                bubbleDiv.style.opacity = '0';
                bubbleDiv.style.pointerEvents = 'none';
            } else {
                bubbleDiv.style.opacity = '1';
                bubbleDiv.style.pointerEvents = 'auto';
            }
            bubbleDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if (gameCompleted || isProcessing) return;
                if (item.matched) return;
                handleBubbleClick(bubbleDiv, item.term, item.id);
            });
            grid.appendChild(bubbleDiv);
            item.dom = bubbleDiv;
        });
    }
    
    function resetGame() {
        if (isProcessing) return;
        clearAllPersistentFlies();
        isProcessing = true;
        selectedBubbleDom = null;
        selectedTerm = null;
        selectedId = null;
        matchedPairsCount = 0;
        gameCompleted = false;
        updateCounterUI();
        
        let shuffled = [...allTerms];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentGameData = shuffled.map((term, idx) => ({
            id: idx,
            term: term,
            matched: false,
            color: getColorAttr(term),
            dom: null,
            pairCounted: false
        }));
        const msgDiv = document.getElementById('messageArea');
        msgDiv.innerHTML = '';
        renderGame();
        setTimeout(() => {
            isProcessing = false;
        }, 50);
    }
    
    // 音效开关
    function toggleSound() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('soundToggleBtn');
        if (soundEnabled) {
            btn.innerHTML = '🔊 音效 开';
        } else {
            btn.innerHTML = '🔇 音效 关';
        }
        // 若开启且音频context未启动则尝试初始化
        if (soundEnabled && audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }
    
    function initGame() {
        let shuffled = [...allTerms];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentGameData = shuffled.map((term, idx) => ({
            id: idx,
            term: term,
            matched: false,
            color: getColorAttr(term),
            dom: null,
            pairCounted: false
        }));
        matchedPairsCount = 0;
        gameCompleted = false;
        updateCounterUI();
        renderGame();
        
        document.getElementById('restartBtn').addEventListener('click', () => resetGame());
        document.getElementById('soundToggleBtn').addEventListener('click', () => toggleSound());
        
        const resumeAudio = () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        };
        document.body.addEventListener('touchstart', resumeAudio, { once: true });
        document.body.addEventListener('click', resumeAudio, { once: true });
        initAudio();
    }
    
    initGame();
</script>
</body>
</html>
