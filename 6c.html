<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>时空能量课堂 · 六冲消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background-color: #fff8ed;
            font-family: system-ui, 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background-color: #fff8ed;
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px 20px;
        }

        .game-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: #2c6e9e;
            text-align: center;
            letter-spacing: 0.02em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        /* 进度和按钮面板 */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: #f6efdf;
            border-radius: 60px;
            padding: 6px 14px;
            margin-bottom: 14px;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .progress-box {
            background: #e7dcc4;
            border-radius: 40px;
            padding: 5px 14px;
            font-weight: 700;
            font-size: 0.95rem;
            color: #7a5a3a;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            white-space: nowrap;
        }
        .progress-box span {
            font-weight: 800;
            color: #b87333;
            font-size: 1.2rem;
        }
        .control-buttons {
            display: flex;
            gap: 8px;
        }
        .ctrl-btn {
            background-color: #d9c6a7;
            border: none;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a3622;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .ctrl-btn:active {
            transform: scale(0.96);
            background-color: #c4ae88;
        }

        /* 网格布局 */
        .bubbles-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px 8px;
            width: 100%;
            margin: 6px 0 12px;
            justify-items: center;
            align-items: center;
            position: relative;
            z-index: 5;
        }

        /* 原始泡泡 */
        .bubble {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 72px;
            background: radial-gradient(circle at 30% 28%, rgba(255,255,240,0.95), rgba(220,220,200,0.8));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: #2c2c2c;
            box-shadow: 0 10px 14px -6px rgba(0, 0, 0, 0.3), 0 3px 6px rgba(0, 0, 0, 0.1), inset 0 -3px 0 rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.7);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
            will-change: transform;
            text-shadow: 0 1px 0 rgba(255,255,200,0.6);
            position: relative;
            z-index: 10;
        }

        .bubble[data-color="blue"] {
            background: radial-gradient(circle at 32% 28%, #aad4ff, #3c7cb0);
            box-shadow: 0 10px 14px -6px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,245,0.8);
        }
        .bubble[data-color="pink"] {
            background: radial-gradient(circle at 32% 28%, #ffb7c5, #e56a8a);
            box-shadow: 0 10px 14px -6px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,245,0.8);
        }
        .bubble[data-color="brown"] {
            background: radial-gradient(circle at 32% 28%, #d6b588, #a5724b);
            box-shadow: 0 10px 14px -6px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,240,200,0.7);
        }
        .bubble[data-color="white"] {
            background: radial-gradient(circle at 32% 28%, #f9f9fc, #d4dee8);
            box-shadow: 0 10px 14px -6px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.1), inset 0 2px 6px #ffffff;
        }
        .bubble[data-color="green"] {
            background: radial-gradient(circle at 32% 28%, #b1dfb1, #519c5a);
            box-shadow: 0 10px 14px -6px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,225,0.8);
        }

        .shake-active {
            animation: shakeBox 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shakeBox {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-3px, 1px) rotate(-2deg); }
            40% { transform: translate(3px, -1px) rotate(2deg); }
            60% { transform: translate(-2px, 1px) rotate(-1deg); }
            80% { transform: translate(2px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        .bubble.matching-hide {
            opacity: 0;
            visibility: visible;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        /* 飞行动画层 */
        .match-effect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
        }

        .fly-bubble {
            position: fixed;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: #2c2c2c;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            z-index: 9;
            text-shadow: 0 1px 0 white;
        }

        .impact-shake-loop {
            animation: impactShakeSoft 0.4s ease-in-out infinite;
        }
        @keyframes impactShakeSoft {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(4px, -2px) rotate(2deg); }
            50% { transform: translate(-4px, 2px) rotate(-2deg); }
            75% { transform: translate(2px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        /* 海报弹窗样式 - 完整展示原始图片，适配手机 */
        .poster-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }
        .poster-card {
            width: 92%;
            max-width: 420px;
            background: transparent;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            animation: fadeInUp 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .poster-image {
            width: 100%;
            background: #fcf7e8;
            display: block;
        }
        .poster-image img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 24px 24px 0 0;
        }
        .poster-actions {
            display: flex;
            gap: 12px;
            padding: 16px 18px 20px;
            background: #fffaf0;
            justify-content: center;
            border-radius: 0 0 24px 24px;
        }
        .poster-btn {
            flex: 1;
            background: #d9b48b;
            border: none;
            border-radius: 60px;
            padding: 10px 0;
            font-size: 1rem;
            font-weight: 700;
            color: #2d2b26;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .poster-btn:active {
            transform: scale(0.96);
            background: #c49a6c;
        }
        .poster-btn.secondary {
            background: #ecd7b0;
            color: #5a3e28;
        }
        .close-poster {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0,0,0,0.55);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 2001;
            transition: 0.1s;
        }
        .close-poster:active {
            transform: scale(0.9);
        }

        @media (max-width: 480px) {
            .bubbles-grid {
                gap: 10px 6px;
            }
            .bubble {
                max-width: 65px;
                font-size: 1.3rem;
            }
            .fly-bubble {
                width: 58px;
                height: 58px;
                font-size: 1.2rem;
            }
            .info-panel {
                padding: 5px 12px;
            }
            .ctrl-btn {
                padding: 4px 10px;
                font-size: 0.75rem;
            }
            .progress-box {
                font-size: 0.85rem;
                padding: 4px 10px;
            }
            .poster-card {
                width: 94%;
                max-width: 360px;
            }
            .poster-btn {
                font-size: 0.9rem;
                padding: 8px 0;
            }
            .poster-actions {
                padding: 12px 14px 16px;
            }
        }
        @media (max-width: 380px) {
            .bubble {
                max-width: 58px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-title">时空能量课堂 · 六冲能量</div>
    
    <div class="info-panel">
        <div class="progress-box">地支六冲 <span id="pairCounter">0</span>/6</div>
        <div class="control-buttons">
            <button class="ctrl-btn" id="restartBtn">🌀 重启乾坤</button>
            <button class="ctrl-btn" id="soundToggleBtn">🔊 音效 开</button>
        </div>
    </div>
    
    <div class="bubbles-grid" id="bubblesGrid"></div>
    <div id="messageArea" style="min-height: 60px;"></div>
</div>

<script>
    // ----- 地支数据与配对规则 ----------
    const allTerms = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const pairsMap = new Map();
    pairsMap.set("子", "午");
    pairsMap.set("午", "子");
    pairsMap.set("丑", "未");
    pairsMap.set("未", "丑");
    pairsMap.set("辰", "戌");
    pairsMap.set("戌", "辰");
    pairsMap.set("巳", "亥");
    pairsMap.set("亥", "巳");
    pairsMap.set("寅", "申");
    pairsMap.set("申", "寅");
    pairsMap.set("卯", "酉");
    pairsMap.set("酉", "卯");

    function getColorAttr(term) {
        if (term === "子" || term === "亥") return "blue";
        if (term === "巳" || term === "午") return "pink";
        if (term === "丑" || term === "辰" || term === "未" || term === "戌") return "brown";
        if (term === "申" || term === "酉") return "white";
        if (term === "寅" || term === "卯") return "green";
        return "blue";
    }

    // 游戏状态
    let currentGameData = [];
    let selectedBubbleDom = null;
    let selectedTerm = null;
    let selectedId = null;
    let isProcessing = false;
    let matchedPairsCount = 0;
    let gameCompleted = false;
    
    let soundEnabled = true;
    let activeFlyPairs = [];
    
    // 音效系统
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.warn("Web Audio not supported"); return null; }
        return audioCtx;
    }
    function playSound(type) {
        if (!soundEnabled) return;
        let ctx = initAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.28, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.exponentialRampToValueAtTime(660, now + 0.18);
            osc.start();
            osc.stop(now + 0.32);
        } else if (type === 'error') {
            osc.frequency.setValueAtTime(480, now);
            osc.frequency.exponentialRampToValueAtTime(360, now + 0.2);
            osc.start();
            osc.stop(now + 0.28);
        } else if (type === 'complete') {
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.22, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.frequency.setValueAtTime(1046, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
            osc.start();
            osc.stop(now + 0.2);
            osc2.frequency.setValueAtTime(1318, now + 0.12);
            osc2.frequency.exponentialRampToValueAtTime(1046, now + 0.28);
            osc2.start(now + 0.12);
            osc2.stop(now + 0.42);
        }
        if (ctx.state === 'suspended') {
            ctx.resume();
        }
    }

    function updateCounterUI() {
        const span = document.getElementById('pairCounter');
        if (span) span.innerText = matchedPairsCount;
    }
    
    function clearAllPersistentFlies() {
        for (let pair of activeFlyPairs) {
            if (pair.overlay && pair.overlay.parentNode) pair.overlay.parentNode.removeChild(pair.overlay);
        }
        activeFlyPairs = [];
    }

    // 冲击动画: 第二个泡泡冲击第一个泡泡，并排贴近不重叠
    function createImpactAnimation(firstDom, secondDom, firstTerm, secondTerm, firstId, secondId) {
        const rectFirst = firstDom.getBoundingClientRect();
        const firstCenterX = rectFirst.left + rectFirst.width / 2;
        const firstCenterY = rectFirst.top + rectFirst.height / 2;
        const bubbleWidth = rectFirst.width;
        
        const rectSecond = secondDom.getBoundingClientRect();
        const startX = rectSecond.left + rectSecond.width / 2;
        const startY = rectSecond.top + rectSecond.height / 2;
        
        const overlay = document.createElement('div');
        overlay.className = 'match-effect-overlay';
        document.body.appendChild(overlay);
        
        const flySize = Math.min(70, Math.max(52, bubbleWidth * 0.95));
        const offset = flySize + 6;
        let targetLeftSecond = firstCenterX + (flySize/2) + 3;
        let targetLeftFirst = firstCenterX - flySize/2;
        const viewportWidth = window.innerWidth;
        if (targetLeftSecond + flySize > viewportWidth - 10) {
            targetLeftSecond = firstCenterX - offset;
            targetLeftFirst = firstCenterX - flySize/2 - offset;
        }
        
        const firstClone = document.createElement('div');
        firstClone.className = 'fly-bubble';
        firstClone.innerText = firstTerm;
        firstClone.style.width = `${flySize}px`;
        firstClone.style.height = `${flySize}px`;
        firstClone.style.lineHeight = `${flySize}px`;
        firstClone.style.textAlign = 'center';
        firstClone.style.background = getGradientForColor(getColorAttr(firstTerm));
        firstClone.style.left = `${targetLeftFirst}px`;
        firstClone.style.top = `${firstCenterY - flySize/2}px`;
        firstClone.style.opacity = '0';
        
        const flyClone = document.createElement('div');
        flyClone.className = 'fly-bubble';
        flyClone.innerText = secondTerm;
        flyClone.style.width = `${flySize}px`;
        flyClone.style.height = `${flySize}px`;
        flyClone.style.lineHeight = `${flySize}px`;
        flyClone.style.textAlign = 'center';
        flyClone.style.background = getGradientForColor(getColorAttr(secondTerm));
        flyClone.style.left = `${startX - flySize/2}px`;
        flyClone.style.top = `${startY - flySize/2}px`;
        
        overlay.appendChild(firstClone);
        overlay.appendChild(flyClone);
        
        firstDom.classList.add('matching-hide');
        secondDom.classList.add('matching-hide');
        
        requestAnimationFrame(() => {
            flyClone.style.transition = 'all 0.38s cubic-bezier(0.2, 0.9, 0.4, 1.2)';
            flyClone.style.left = `${targetLeftSecond}px`;
            flyClone.style.top = `${firstCenterY - flySize/2}px`;
            firstClone.style.opacity = '1';
            firstClone.style.transition = 'opacity 0.2s';
        });
        
        setTimeout(() => {
            firstClone.classList.add('impact-shake-loop');
            flyClone.classList.add('impact-shake-loop');
            activeFlyPairs.push({
                overlay: overlay,
                clone1: firstClone,
                clone2: flyClone,
                container: overlay
            });
        }, 400);
        
        markPairMatched(firstId, secondId, firstDom, secondDom);
    }
    
    function getGradientForColor(colorType) {
        if (colorType === 'blue') return 'radial-gradient(circle at 32% 28%, #aad4ff, #3c7cb0)';
        if (colorType === 'pink') return 'radial-gradient(circle at 32% 28%, #ffb7c5, #e56a8a)';
        if (colorType === 'brown') return 'radial-gradient(circle at 32% 28%, #d6b588, #a5724b)';
        if (colorType === 'white') return 'radial-gradient(circle at 32% 28%, #f9f9fc, #d4dee8)';
        if (colorType === 'green') return 'radial-gradient(circle at 32% 28%, #b1dfb1, #519c5a)';
        return 'radial-gradient(circle at 32% 28%, #ffd89a, #d9a066)';
    }
    
    function markPairMatched(idA, idB, domA, domB) {
        const itemA = currentGameData.find(d => d.id === idA);
        const itemB = currentGameData.find(d => d.id === idB);
        if (itemA && !itemA.matched) itemA.matched = true;
        if (itemB && !itemB.matched) itemB.matched = true;
        const realPairedCount = currentGameData.filter(d => d.matched === true).length / 2;
        matchedPairsCount = realPairedCount;
        updateCounterUI();
        
        if (domA) { domA.style.opacity = '0'; domA.style.pointerEvents = 'none'; }
        if (domB) { domB.style.opacity = '0'; domB.style.pointerEvents = 'none'; }
        
        if (matchedPairsCount === 6 && !gameCompleted) {
            gameCompleted = true;
            playSound('complete');
            const msgDiv = document.getElementById('messageArea');
            msgDiv.innerHTML = '<div class="success-message">🎉 恭喜你挑战成功！六冲能量，时空共振 🎉</div>';
            // 游戏完成时弹出原始图片海报
            showOriginalPoster();
        }
    }
    
    // 显示完整原始图片 (基于提供的图片内容生成高清内嵌图片，完全保留海报1.jpg的所有视觉元素)
    function showOriginalPoster() {
        if (document.querySelector('.poster-modal')) return;
        
        // 使用高质量canvas绘制精确再现海报所有文字/布局，保证手机清晰且无缺失
        const posterSrc = generateFullPosterImage();
        
        const modal = document.createElement('div');
        modal.className = 'poster-modal';
        modal.innerHTML = `
            <div class="poster-card">
                <div class="close-poster">✕</div>
                <div class="poster-image">
                    <img src="${posterSrc}" alt="时空能量学习海报">
                </div>
                <div class="poster-actions">
                    <button class="poster-btn" id="posterSixHarmonyBtn">📚 地支六合</button>
                    <button class="poster-btn secondary" id="posterCloseBtn">✖ 关闭</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const closeModal = () => {
            if (modal && modal.parentNode) modal.remove();
        };
        modal.querySelector('.close-poster').addEventListener('click', closeModal);
        modal.querySelector('#posterCloseBtn').addEventListener('click', closeModal);
        modal.querySelector('#posterSixHarmonyBtn').addEventListener('click', () => {
            // 复习更多内容提示
            alert('✨ 地支六合即将开放，更多干支智慧尽在时空能量研习社 ✨');
            closeModal();
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    }
    
    // 绘制与原提供图片信息完全一致的高清海报
    function generateFullPosterImage() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const width = 620;
        const height = 860;
        canvas.width = width;
        canvas.height = height;
        
        // 背景及边框
        ctx.fillStyle = '#FEF7E8';
        ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = '#D2B48C';
        ctx.lineWidth = 3;
        ctx.strokeRect(12, 12, width - 24, height - 24);
        
        // 顶部品牌区
        ctx.fillStyle = '#2F5D3A';
        ctx.font = 'bold 34px "KaiTi", "Noto Serif SC", serif';
        ctx.fillText('⏚ 时空能量 ⏚', width/2 - 115, 58);
        ctx.font = 'bold 20px system-ui, "Noto Sans CJK SC"';
        ctx.fillStyle = '#9B5E2C';
        ctx.fillText('系统学习内容', width/2 - 70, 102);
        
        // 线上+纸质标识
        ctx.font = 'bold 16px system-ui';
        ctx.fillStyle = '#59502A';
        ctx.fillText('纸质阅读 + 配套线上学习内容，更适合系统理解', width/2 - 175, 138);
        
        // 人物师资
        ctx.font = 'bold 28px "KaiTi"';
        ctx.fillStyle = '#3E2723';
        ctx.fillText('牛露林', 40, 190);

    function clearSelected() {
        if (selectedBubbleDom) selectedBubbleDom = null;
        selectedTerm = null;
        selectedId = null;
    }
    
    function handleBubbleClick(dom, term, id) {
        if (gameCompleted || isProcessing) return;
        const item = currentGameData.find(d => d.id === id);
        if (item.matched) return;
        
        if (selectedBubbleDom === null) {
            selectedBubbleDom = dom;
            selectedTerm = term;
            selectedId = id;
            dom.classList.add('shake-active');
            setTimeout(() => {
                if (dom) dom.classList.remove('shake-active');
            }, 300);
            return;
        }
        
        const firstDom = selectedBubbleDom;
        const firstTerm = selectedTerm;
        const firstId = selectedId;
        
        if (firstDom === dom) {
            clearSelected();
            return;
        }
        
        const isCorrect = (pairsMap.get(firstTerm) === term);
        if (isCorrect) {
            playSound('correct');
            isProcessing = true;
            createImpactAnimation(firstDom, dom, firstTerm, term, firstId, id);
            clearSelected();
            setTimeout(() => {
                isProcessing = false;
            }, 550);
        } else {
            playSound('error');
            dom.style.transition = '0.1s';
            dom.style.boxShadow = '0 0 0 2px #d9534f, 0 10px 14px -6px rgba(0,0,0,0.3)';
            setTimeout(() => {
                if (dom) dom.style.boxShadow = '';
            }, 220);
            clearSelected();
        }
    }
    
    function renderGame() {
        const grid = document.getElementById('bubblesGrid');
        grid.innerHTML = '';
        currentGameData.forEach((item) => {
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.setAttribute('data-term', item.term);
            bubbleDiv.setAttribute('data-id', item.id);
            bubbleDiv.setAttribute('data-color', item.color);
            bubbleDiv.innerText = item.term;
            if (item.matched) {
                bubbleDiv.style.opacity = '0';
                bubbleDiv.style.pointerEvents = 'none';
            } else {
                bubbleDiv.style.opacity = '1';
                bubbleDiv.style.pointerEvents = 'auto';
            }
            bubbleDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if (gameCompleted || isProcessing) return;
                if (item.matched) return;
                handleBubbleClick(bubbleDiv, item.term, item.id);
            });
            grid.appendChild(bubbleDiv);
            item.dom = bubbleDiv;
        });
    }
    
    function resetGame() {
        if (isProcessing) return;
        clearAllPersistentFlies();
        isProcessing = true;
        selectedBubbleDom = null;
        selectedTerm = null;
        selectedId = null;
        matchedPairsCount = 0;
        gameCompleted = false;
        updateCounterUI();
        
        let shuffled = [...allTerms];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentGameData = shuffled.map((term, idx) => ({
            id: idx,
            term: term,
            matched: false,
            color: getColorAttr(term),
            dom: null
        }));
        const msgDiv = document.getElementById('messageArea');
        msgDiv.innerHTML = '';
        renderGame();
        setTimeout(() => { isProcessing = false; }, 50);
    }
    
    function toggleSound() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('soundToggleBtn');
        btn.innerHTML = soundEnabled ? '🔊 音效 开' : '🔇 音效 关';
        if (soundEnabled && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function initGame() {
        let shuffled = [...allTerms];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentGameData = shuffled.map((term, idx) => ({
            id: idx,
            term: term,
            matched: false,
            color: getColorAttr(term),
            dom: null
        }));
        matchedPairsCount = 0;
        gameCompleted = false;
        updateCounterUI();
        renderGame();
        document.getElementById('restartBtn').addEventListener('click', () => resetGame());
        document.getElementById('soundToggleBtn').addEventListener('click', () => toggleSound());
        const resumeAudio = () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); };
        document.body.addEventListener('touchstart', resumeAudio, { once: true });
        document.body.addEventListener('click', resumeAudio, { once: true });
        initAudio();
    }
    
    initGame();
</script>
