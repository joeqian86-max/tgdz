<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>干支虚实 · 连击挑战</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f8f1e2;
            background-image: radial-gradient(circle at 10% 20%, rgba(200, 170, 120, 0.15) 2%, transparent 2.5%);
            background-size: 34px 34px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }

        /* 主卡片 */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: #fffbf2;
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(100, 70, 40, 0.15);
            overflow: hidden;
            border: 1px solid #f0e2cf;
            transition: all 0.2s;
        }

        /* 头部 - 蓝色标题 */
        .game-header {
            background: #f5ecdb;
            padding: 1.2rem 1rem 0.8rem;
            text-align: center;
            border-bottom: 2px solid #e9dccd;
        }
        .game-header h1 {
            margin: 0;
            font-size: clamp(1.4rem, 6vw, 1.9rem);
            color: #2c6e9e;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* 数据面板：连击、最高连击 + 按钮组在一行 */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fef7ed;
            padding: 12px 20px;
            border-bottom: 1px solid #eadbc5;
            flex-wrap: wrap;
            gap: 10px;
        }
        .left-stats {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .stat-card {
            background: #e8ddcb;
            border-radius: 80px;
            padding: 5px 18px;
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-weight: bold;
            color: #6d4c2e;
            box-shadow: inset 0 1px 2px #fff4e6, 0 1px 2px rgba(0,0,0,0.05);
        }
        .stat-card span:first-child {
            font-size: 0.85rem;
        }
        .stat-card span:last-child {
            font-size: 1.4rem;
            font-weight: 800;
            color: #c2713a;
            line-height: 1;
        }
        .action-buttons-stats {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: #e2d2ba;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .icon-btn:hover {
            background: #d4c0a0;
            transform: scale(0.96);
        }

        /* 计时器圆形展示 */
        .timer-area {
            display: flex;
            justify-content: center;
            margin: 15px 20px 5px;
        }
        .timer-circle {
            background: #f7efdf;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid #dcb985;
            box-shadow: 0 6px 12px rgba(100, 60, 20, 0.1);
        }
        .timer-seconds {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: monospace;
            color: #a5682c;
            line-height: 1;
        }
        .timer-label {
            font-size: 0.65rem;
            color: #b47c48;
        }

        /* 答题区 */
        .quiz-area {
            padding: 5px 20px 20px;
            text-align: center;
        }
        .ganzhi-display {
            background: #fef8ef;
            border-radius: 64px;
            margin: 10px 10px 20px;
            padding: 30px 10px;
            box-shadow: inset 0 1px 4px #ffe8cf, 0 10px 18px rgba(80, 50, 20, 0.08);
            border: 1px solid #eedbbc;
        }
        .ganzhi-text {
            font-size: clamp(3rem, 12vw, 5.5rem);
            font-weight: 800;
            letter-spacing: 8px;
            font-family: 'Segoe UI', 'Noto Serif CJK SC', '华文楷书', serif;
            color: #c97e3a;   /* 干支新颜色：深琥珀色 */
            text-shadow: 2px 2px 0 #f3e2ca;
        }
        .game-title-tag {
            font-size: 1.1rem;
            font-weight: 500;
            background: #efe2cf;
            display: inline-block;
            padding: 5px 22px;
            border-radius: 60px;
            margin-bottom: 12px;
            color: #8b5a36;
        }

        /* 虚实按钮 - 绿色/紫色 */
        .action-buttons {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin: 20px 0 15px;
            flex-wrap: wrap;
        }
        .btn-real {
            background: #6fbf4c;   /* 绿色 */
            color: #ffffff;
            border-bottom: 3px solid #4a8a2e;
        }
        .btn-virtual {
            background: #b280b2;   /* 紫色 */
            color: #ffffff;
            border-bottom: 3px solid #8b5c8b;
        }
        .btn-real, .btn-virtual {
            font-size: 1.7rem;
            font-weight: bold;
            padding: 12px 32px;
            border: none;
            border-radius: 66px;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            letter-spacing: 4px;
            box-shadow: 0 5px 0 rgba(100, 60, 20, 0.2);
            min-width: 130px;
        }
        .btn-real:hover:not(:disabled) {
            background: #82d55c;
            transform: translateY(-2px);
        }
        .btn-virtual:hover:not(:disabled) {
            background: #c994c9;
            transform: translateY(-2px);
        }
        .btn-real:disabled, .btn-virtual:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* 反馈区 */
        .feedback-area {
            background: #efe3d1;
            margin: 10px 20px;
            padding: 12px;
            border-radius: 48px;
            text-align: center;
            font-weight: 500;
            color: #7a582e;
            min-height: 70px;
        }
        .feedback-correct {
            background: #dee5bf;
            border-left: 6px solid #7faa5a;
            color: #3b5c1e;
        }
        .feedback-wrong {
            background: #f3dfcf;
            border-left: 6px solid #d9986a;
            color: #aa5a2c;
        }
        .feedback-neutral {
            background: #efe3d1;
        }

        /* 底部按钮组 */
        .control-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 8px 20px 28px;
        }
        .reset-btn, .study-btn {
            background: #e6d7c0;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 600;
            color: #775a37;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .reset-btn:hover, .study-btn:hover {
            background: #dac5a5;
            transform: scale(0.97);
        }

        /* 排行榜模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(70, 45, 25, 0.75);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-card {
            background: #fff7ed;
            max-width: 360px;
            width: 85%;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid #e5cfb0;
            color: #563e26;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-card h3 {
            font-size: 1.8rem;
            margin: 0 0 12px;
            color: #b87a44;
        }
        .rank-list {
            text-align: left;
            margin: 20px 0;
            max-height: 260px;
            overflow-y: auto;
            background: #fcf3e6;
            border-radius: 32px;
            padding: 8px 12px;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 6px;
            border-bottom: 1px solid #eedfcb;
            font-size: 0.9rem;
        }
        .nickname-input {
            padding: 12px;
            width: 85%;
            border-radius: 60px;
            border: 1px solid #dfcbad;
            background: #fffcf5;
            color: #4f351f;
            text-align: center;
            font-size: 1rem;
            margin: 10px 0;
        }
        .modal-close-btn {
            background: #ddc7a4;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            color: #4c351c;
        }

        @media (max-width: 550px) {
            .btn-real, .btn-virtual {
                font-size: 1.3rem;
                padding: 8px 20px;
                min-width: 110px;
            }
            .timer-circle {
                width: 65px;
                height: 65px;
            }
            .timer-seconds {
                font-size: 1.8rem;
            }
            .stat-card span:last-child {
                font-size: 1.2rem;
            }
            .left-stats {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>干支虚实 · 连击挑战</h1>
    </div>

    <div class="stats-panel">
        <div class="left-stats">
            <div class="stat-card">连击 <span id="comboCount">0</span></div>
            <div class="stat-card">最高连击 <span id="maxComboRecord">0</span></div>
        </div>
        <div class="action-buttons-stats">
            <button class="icon-btn" id="soundToggleBtn">音效 ON</button>
            <button class="icon-btn" id="openRankBtn">排行榜</button>
        </div>
    </div>

    <div class="timer-area">
        <div class="timer-circle">
            <div class="timer-seconds" id="timerDisplay">5.0</div>
            <div class="timer-label">秒</div>
        </div>
    </div>

    <div class="quiz-area">
        <div class="game-title-tag">此干支是【实】还是【虚】？</div>
        <div class="ganzhi-display">
            <div class="ganzhi-text" id="currentGanZhi">甲子</div>
        </div>
        <div class="action-buttons">
            <button class="btn-real" id="realBtn">实</button>
            <button class="btn-virtual" id="virtualBtn">虚</button>
        </div>
        <div class="feedback-area" id="feedbackMsg">
            限时判断，答对连击加分
        </div>
    </div>

    <div class="control-group">
        <button class="reset-btn" id="resetGameBtn">新的一局</button>
        <button class="study-btn" id="studyEndBtn">先学到这</button>
    </div>
</div>

<!-- 排行榜模态框 -->
<div id="rankModal" class="modal">
    <div class="modal-card">
        <h3>最高连击榜</h3>
        <div id="rankListContainer" class="rank-list">加载中...</div>
        <div>
            <input type="text" id="nicknameInput" class="nickname-input" placeholder="输入昵称登榜" maxlength="12">
        </div>
        <button id="closeRankBtn" class="modal-close-btn">返回游戏</button>
    </div>
</div>

<script>
    // ---------- 完整虚实题库 ----------
    const realList = [
        "甲寅", "甲辰", "甲子", "乙亥", "乙卯", "乙未", "丙寅", "丙午", "丙戌",
        "丁巳", "丁卯", "丁未", "戊戌", "戊午", "戊辰", "己巳", "己未", "己丑",
        "庚申", "庚辰", "辛丑", "辛酉", "壬申", "壬子", "壬辰", "癸亥", "癸酉", "癸丑"
    ];
    const virtualList = [
        "甲申", "甲戌", "甲午", "乙巳", "乙酉", "乙丑", "丙子", "丙申", "丙辰",
        "丁亥", "丁丑", "丁酉", "戊子", "戊申", "戊寅", "己亥", "己酉", "己卯",
        "庚子", "庚午", "庚寅", "庚戌", "辛巳", "辛亥", "辛未", "辛卯",
        "壬戌", "壬午", "壬寅", "癸巳", "癸未", "癸卯"
    ];
    let questionBank = [];
    realList.forEach(g => questionBank.push({ ganzhi: g, isReal: true }));
    virtualList.forEach(g => questionBank.push({ ganzhi: g, isReal: false }));

    // ---------- 游戏状态 ----------
    let currentQuestion = null;
    let combo = 0;
    let maxComboThisSession = 0;        // 本次游戏最高连击
    let timeLeft = 5.0;
    let timerInterval = null;
    let canAnswer = true;
    let waitingNext = false;
    let nextQuestionTimeout = null;

    // 音效相关
    let soundEnabled = true;
    let audioCtx = null;
    let isAudioUnlocked = false;

    // DOM 元素
    const ganzhiElem = document.getElementById('currentGanZhi');
    const comboSpan = document.getElementById('comboCount');
    const maxComboRecordSpan = document.getElementById('maxComboRecord');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const realBtn = document.getElementById('realBtn');
    const virtualBtn = document.getElementById('virtualBtn');
    const resetBtn = document.getElementById('resetGameBtn');
    const studyEndBtn = document.getElementById('studyEndBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const openRankBtn = document.getElementById('openRankBtn');

    // ---------- 排行榜（基于最高连击）----------
    let currentUserNick = localStorage.getItem('userNick') || "修行者";
    let rankData = JSON.parse(localStorage.getItem('comboRank')) || [];

    function saveRank(nick, maxComboValue) {
        let existing = rankData.find(entry => entry.nick === nick);
        if (existing) {
            if (maxComboValue > existing.maxCombo) {
                existing.maxCombo = maxComboValue;
                existing.date = Date.now();
            }
        } else {
            rankData.push({ nick: nick, maxCombo: maxComboValue, date: Date.now() });
        }
        rankData.sort((a,b) => {
            if (a.maxCombo !== b.maxCombo) return b.maxCombo - a.maxCombo;
            else return b.date - a.date;
        });
        if (rankData.length > 10) rankData = rankData.slice(0, 10);
        localStorage.setItem('comboRank', JSON.stringify(rankData));
    }

    function updateRankingUI() {
        const container = document.getElementById('rankListContainer');
        if (!container) return;
        if (rankData.length === 0) {
            container.innerHTML = '<div class="rank-item">暂无记录，成为第一吧！</div>';
            return;
        }
        container.innerHTML = rankData.map((entry, idx) => {
            return `<div class="rank-item"><span>${idx+1}. ${escapeHtml(entry.nick)}</span><span>${entry.maxCombo} 连击</span></div>`;
        }).join('');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showRankModal() {
        updateRankingUI();
        const modal = document.getElementById('rankModal');
        const nicknameInput = document.getElementById('nicknameInput');
        nicknameInput.value = currentUserNick;
        modal.style.display = 'flex';
    }

    function closeRankModal() {
        const modal = document.getElementById('rankModal');
        modal.style.display = 'none';
        const newNick = document.getElementById('nicknameInput').value.trim();
        if (newNick !== "") {
            currentUserNick = newNick;
            localStorage.setItem('userNick', currentUserNick);
        }
    }

    // 更新本次最高连击并保存到排行榜
    function updateMaxComboAndSave() {
        if (combo > maxComboThisSession) {
            maxComboThisSession = combo;
            maxComboRecordSpan.innerText = maxComboThisSession;
            if (maxComboThisSession > 0) {
                saveRank(currentUserNick, maxComboThisSession);
            }
        }
    }

    // ---------- 游戏逻辑 ----------
    function getRandomQuestion() {
        const idx = Math.floor(Math.random() * questionBank.length);
        return { ...questionBank[idx] };
    }

    function updateStatsUI() {
        comboSpan.innerText = combo;
        if (combo > maxComboThisSession) {
            maxComboThisSession = combo;
            maxComboRecordSpan.innerText = maxComboThisSession;
            saveRank(currentUserNick, maxComboThisSession);
        }
    }

    function breakCombo() {
        if (combo > 0) {
            combo = 0;
            updateStatsUI();
            return true;
        }
        return false;
    }

    // 倒计时控制
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startCountdown() {
        if (timerInterval) stopTimer();
        canAnswer = true;
        timeLeft = 5.0;
        timerDisplaySpan.innerText = timeLeft.toFixed(1);
        timerInterval = setInterval(() => {
            if (!canAnswer || waitingNext) return;
            if (timeLeft <= 0.05) {
                clearInterval(timerInterval);
                timerInterval = null;
                if (canAnswer && !waitingNext) {
                    handleTimeout();
                }
            } else {
                timeLeft -= 0.1;
                if (timeLeft < 0) timeLeft = 0;
                timerDisplaySpan.innerText = timeLeft.toFixed(1);
                // 音效：倒计时紧迫感
                if (soundEnabled && audioCtx && isAudioUnlocked) {
                    if (timeLeft <= 1.2 && timeLeft > 0) {
                        playUrgentTick();
                    } else if (timeLeft <= 2.5 && Math.random() < 0.3) {
                        playSoftTick();
                    }
                }
            }
        }, 100);
    }

    function handleTimeout() {
        if (waitingNext) return;
        waitingNext = true;
        canAnswer = false;
        breakCombo();
        setFeedbackMsg(`超时！ “${currentQuestion.ganzhi}” 未作答，连击中断`, false);
        if (soundEnabled && audioCtx && isAudioUnlocked) playErrorSound();
        if (nextQuestionTimeout) clearTimeout(nextQuestionTimeout);
        nextQuestionTimeout = setTimeout(() => {
            loadNextQuestion();
        }, 1200);
    }

    function handleAnswer(selectedReal) {
        if (!canAnswer || waitingNext) return;
        const isCorrect = (selectedReal === currentQuestion.isReal);
        canAnswer = false;
        waitingNext = true;
        stopTimer();

        if (isCorrect) {
            combo++;
            updateStatsUI();
            setFeedbackMsg(`正确！ “${currentQuestion.ganzhi}” 为【${currentQuestion.isReal ? '实' : '虚'}】 连击×${combo}`, true);
            if (soundEnabled && audioCtx && isAudioUnlocked) playCorrectSound();
        } else {
            breakCombo();
            setFeedbackMsg(`错误！ “${currentQuestion.ganzhi}” 应为【${currentQuestion.isReal ? '实' : '虚'}】，连击清零`, false);
            if (soundEnabled && audioCtx && isAudioUnlocked) playErrorSound();
        }

        if (nextQuestionTimeout) clearTimeout(nextQuestionTimeout);
        nextQuestionTimeout = setTimeout(() => {
            loadNextQuestion();
        }, 1300);
    }

    function loadNextQuestion() {
        if (nextQuestionTimeout) clearTimeout(nextQuestionTimeout);
        waitingNext = false;
        canAnswer = true;
        currentQuestion = getRandomQuestion();
        ganzhiElem.innerText = currentQuestion.ganzhi;
        stopTimer();
        startCountdown();
        setFeedbackMsg(`新题目: ${currentQuestion.ganzhi} 选择虚实`, false, true);
    }

    function setFeedbackMsg(msg, isCorrect, isNeutral = false) {
        feedbackDiv.innerHTML = msg;
        if (isNeutral) {
            feedbackDiv.className = "feedback-area feedback-neutral";
        } else if (isCorrect) {
            feedbackDiv.className = "feedback-area feedback-correct";
        } else {
            feedbackDiv.className = "feedback-area feedback-wrong";
        }
    }

    // ---------- 音效系统 (复刻拖拽版) ----------
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function unlockAudio() {
        if (audioCtx && !isAudioUnlocked) {
            audioCtx.resume().then(() => { isAudioUnlocked = true; });
        } else if (!audioCtx) {
            initAudio();
            audioCtx.resume().then(() => { isAudioUnlocked = true; });
        }
    }
    function playCorrectSound() {
        if (!soundEnabled || !audioCtx || !isAudioUnlocked) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
        osc.start();
        osc.stop(now + 0.3);
    }
    function playErrorSound() {
        if (!soundEnabled || !audioCtx || !isAudioUnlocked) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 520;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
        osc.start();
        osc.stop(now + 0.35);
    }
    function playSoftTick() {
        if (!soundEnabled || !audioCtx || !isAudioUnlocked) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 1200;
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
        osc.start();
        osc.stop(now + 0.1);
    }
    function playUrgentTick() {
        if (!soundEnabled || !audioCtx || !isAudioUnlocked) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 1800;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
        osc.start();
        osc.stop(now + 0.08);
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.frequency.value = 2100;
        gain2.gain.setValueAtTime(0.12, now + 0.08);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
        osc2.start(now + 0.08);
        osc2.stop(now + 0.16);
    }

    // ---------- 重置游戏 ----------
    function resetGame() {
        if (nextQuestionTimeout) clearTimeout(nextQuestionTimeout);
        stopTimer();
        waitingNext = false;
        canAnswer = true;
        combo = 0;
        maxComboThisSession = 0;
        updateStatsUI();
        currentQuestion = getRandomQuestion();
        ganzhiElem.innerText = currentQuestion.ganzhi;
        setFeedbackMsg(`游戏已重置！请判断 “${currentQuestion.ganzhi}”`, false, true);
        startCountdown();
        saveRank(currentUserNick, 0);
    }

    // ---------- 事件绑定 ----------
    realBtn.addEventListener('click', () => handleAnswer(true));
    virtualBtn.addEventListener('click', () => handleAnswer(false));
    resetBtn.addEventListener('click', resetGame);
    studyEndBtn.addEventListener('click', () => {
        showRankModal();
    });
    soundToggleBtn.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggleBtn.innerHTML = soundEnabled ? "音效 ON" : "音效 OFF";
        if (soundEnabled && !audioCtx) initAudio();
        if (soundEnabled && audioCtx && audioCtx.state !== 'running') unlockAudio();
    });
    openRankBtn.addEventListener('click', showRankModal);
    document.getElementById('closeRankBtn').addEventListener('click', closeRankModal);

    // 首次交互解锁音频
    function unlockOnFirstInteraction() {
        unlockAudio();
        document.body.removeEventListener('click', unlockOnFirstInteraction);
        document.body.removeEventListener('touchstart', unlockOnFirstInteraction);
    }
    document.body.addEventListener('click', unlockOnFirstInteraction);
    document.body.addEventListener('touchstart', unlockOnFirstInteraction);

    // 初始化游戏
    function init() {
        initAudio();
        currentQuestion = getRandomQuestion();
        ganzhiElem.innerText = currentQuestion.ganzhi;
        combo = 0;
        maxComboThisSession = 0;
        updateStatsUI();
        startCountdown();
        setFeedbackMsg(`判断 “${currentQuestion.ganzhi}” 虚实，连击加成`, false, true);
        rankData = JSON.parse(localStorage.getItem('comboRank')) || [];
        currentUserNick = localStorage.getItem('userNick') || "修行者";
        updateRankingUI();
    }
    init();
</script>
</body>
</html>
